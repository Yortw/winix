name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Winix.sln

      - name: Build
        run: dotnet build Winix.sln --no-restore -c Release

      # Linux libsecret integration tests (Winix.SecretStore.Tests, Winix.EnvVault.Tests)
      # need the secret-tool binary AND a running secret service. Install libsecret-tools
      # plus gnome-keyring, then wrap the test run in dbus-run-session with an unlocked
      # keyring — without this, AssertAvailable() throws and the SecretStore + EnvVault
      # Linux integration tests fail before exercising any actual logic.
      - name: Install Linux secret-service dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: Test (Linux — eval dbus-launch + unlock fresh keyring)
        if: matrix.os == 'ubuntu-latest'
        # The runner image has a pre-existing gnome-keyring-daemon (the previous
        # attempt's `discover_other_daemon: 1` log line). Clearing
        # ~/.local/share/keyrings + using `dbus-launch` (not dbus-run-session, which
        # forks a sub-shell whose env vars don't reach later steps) lets us own the
        # session. `printf "" | gnome-keyring-daemon --unlock --start --components=secrets`
        # creates the default login collection with an empty password and starts the
        # daemon — matching the python-keyring / openSUSE-tumbleweed CI pattern.
        run: |
          rm -rf "$HOME/.local/share/keyrings"/* 2>/dev/null || true
          eval "$(dbus-launch --sh-syntax)"
          printf '' | gnome-keyring-daemon --unlock --start --components=secrets
          dotnet test Winix.sln --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Test (Windows + macOS)
        if: matrix.os != 'ubuntu-latest'
        run: dotnet test Winix.sln --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          retention-days: 7
