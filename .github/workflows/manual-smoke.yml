name: Manual Smoke (cross-platform)

# Manually-dispatched cross-platform smoke verification: builds AOT for the
# requested target(s) and replays each tool's existing run-smokes.sh against
# the freshly-published binary. Uploads exit-code captures + stdout/stderr as
# artifacts for diff against the per-tool baselines under
# artifacts/round-stop-2026-05-09/ and artifacts/reverify-2026-05-06/.
#
# Why this exists separately from ci.yml and release.yml:
#   - ci.yml runs `dotnet test` (JIT xUnit) — covers correctness but not the
#     AOT-published binary's behaviour on each platform.
#   - release.yml builds AOT for win-x64/linux-x64/osx-x64/osx-arm64 but only
#     as a side-effect of tagging — no smokes are run against the AOT outputs.
#   - This workflow gives us pre-tag confidence that the actual shipped AOT
#     binaries behave correctly on each target OS, with a manual trigger so
#     we can verify before tagging without needing to push and revert.

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Targets to smoke (comma-separated): linux-x64, osx-arm64, osx-x64. Default: all three."
        required: false
        default: "linux-x64,osx-arm64,osx-x64"
      tools:
        description: "Tools to smoke (comma-separated). Default: all."
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.build-matrix.outputs.include }}
    steps:
      - name: Build matrix from inputs
        id: build-matrix
        run: |
          INPUT_TARGETS="${{ github.event.inputs.targets }}"
          INPUT_TARGETS="${INPUT_TARGETS:-linux-x64,osx-arm64,osx-x64}"

          INCLUDE="["
          first=1
          IFS=',' read -ra TARGETS <<< "$INPUT_TARGETS"
          for t in "${TARGETS[@]}"; do
            t=$(echo "$t" | xargs)  # trim whitespace
            case "$t" in
              linux-x64)   os="ubuntu-latest" ;;
              osx-x64)     os="macos-latest" ;;  # cross-compile on arm64 runner; macos-13 retired
              osx-arm64)   os="macos-latest" ;;
              *) echo "::error::Unknown target '$t' (expected linux-x64, osx-x64, osx-arm64)" ; exit 1 ;;
            esac
            if [ $first -eq 0 ]; then INCLUDE="$INCLUDE,"; fi
            INCLUDE="$INCLUDE{\"rid\":\"$t\",\"os\":\"$os\"}"
            first=0
          done
          INCLUDE="$INCLUDE]"
          echo "include=$INCLUDE" >> "$GITHUB_OUTPUT"
          echo "Matrix: $INCLUDE"

  smoke:
    needs: resolve-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install GNU coreutils (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS BSD utils don't ship `timeout`; coreutils provides it as gtimeout.
          brew install coreutils
          # Symlink gtimeout → timeout so the smoke step is portable across runners.
          mkdir -p /tmp/winix-bin
          ln -sf "$(which gtimeout)" /tmp/winix-bin/timeout
          echo "/tmp/winix-bin" >> "$GITHUB_PATH"

      - name: Resolve tool list
        id: tools
        shell: bash
        run: |
          INPUT_TOOLS="${{ github.event.inputs.tools }}"
          if [ -z "$INPUT_TOOLS" ] || [ "$INPUT_TOOLS" = "all" ]; then
            TOOLS="timeit,squeeze,peep,wargs,files,treex,man,less,whoholds,schedule,nc,winix,retry,when,clip,ids,digest,notify,url,qr,protect,unprotect,envvault,demux,mksecret,trash,hcat"
          else
            TOOLS="$INPUT_TOOLS"
          fi
          echo "list=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "Smoking: $TOOLS"

      - name: Pre-build shared libraries
        shell: bash
        run: |
          for shared in Yort.ShellKit Winix.FileWalk Winix.Codec Winix.QrCode Winix.SecretStore; do
            if [ -d "src/$shared" ]; then
              dotnet build "src/$shared/$shared.csproj" -c Release -p:Version=0.3.0 --nologo -v quiet
            fi
          done

      - name: AOT publish each tool (serial)
        shell: bash
        run: |
          mkdir -p "artifacts/manual-smoke/${{ matrix.rid }}"
          IFS=',' read -ra TOOLS <<< "${{ steps.tools.outputs.list }}"
          for t in "${TOOLS[@]}"; do
            out="artifacts/manual-smoke/${{ matrix.rid }}/${t}"
            echo "::group::publish $t"
            dotnet publish "src/${t}/${t}.csproj" \
              -c Release -r ${{ matrix.rid }} -p:Version=0.3.0 \
              -o "$out" --nologo -v quiet
            echo "::endgroup::"
          done

      - name: Run platform-portable smokes per tool
        shell: bash
        run: |
          ART="artifacts/manual-smoke/${{ matrix.rid }}"
          SUMMARY="$ART/smoke-summary.txt"
          > "$SUMMARY"

          # Per-tool smoke runner location. Function dispatcher (not `declare -A`)
          # because macOS GHA runners ship bash 3.2. Mapping reflects which baseline
          # directory actually has each tool's runner. unprotect has no separate
          # runner — protect's exercises both ends of the round-trip.
          runner_for() {
            case "$1" in
              clip|envvault|files|less|man|nc|peep|protect|retry|schedule|treex|wargs|whoholds|winix)
                echo "round-stop-2026-05-09/$1" ;;
              timeit|url|digest|notify|ids|when|qr|squeeze)
                echo "reverify-2026-05-06/$1" ;;
              demux|mksecret|trash|hcat)
                echo "v0.4-smoke/$1" ;;
              *) echo "" ;;
            esac
          }

          IFS=',' read -ra TOOLS <<< "${{ steps.tools.outputs.list }}"
          for t in "${TOOLS[@]}"; do
            echo "==== $t ====" | tee -a "$SUMMARY"

            bin="$ART/$t/$t"
            if [ ! -x "$bin" ]; then
              echo "  SKIP: AOT binary missing at $bin" | tee -a "$SUMMARY"
              continue
            fi

            runner_subdir="$(runner_for "$t")"
            if [ -z "$runner_subdir" ]; then
              echo "  SKIP: no runner mapping for $t" | tee -a "$SUMMARY"
              continue
            fi

            src_runner="artifacts/${runner_subdir}/run-smokes.sh"
            if [ ! -f "$src_runner" ]; then
              echo "  SKIP: source runner missing at $src_runner" | tee -a "$SUMMARY"
              continue
            fi

            dst_runner="$ART/$t/run-smokes.sh"
            cp "$src_runner" "$dst_runner"
            # Retarget BIN+OUT to the freshly-published AOT binary on this runner.
            # Generic regex with backref captures the tool name so cross-tool refs
            # (e.g. protect's runner referencing both protect.exe and unprotect.exe)
            # rewrite correctly. -E for extended regex (works on both GNU + BSD sed).
            # Most-specific patterns first (full bin path), then directory prefix
            # WITHOUT trailing slash so `ART="...round-stop-2026-05-09/winix"`-style
            # lines (no trailing /) also rewrite. -E for extended regex (works on
            # GNU + BSD sed).
            sed -E -i.bak \
              -e 's|[Dd]:/projects/winix/||g' \
              -e 's|artifacts/round-stop-2026-05-09/([a-z]+)/fresh-publish/\1\.exe|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1/\1|g' \
              -e 's|artifacts/reverify-2026-05-06/([a-z]+)/bin/\1\.exe|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1/\1|g' \
              -e 's|artifacts/v0.4-smoke/([a-z]+)/bin/\1\.exe|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1/\1|g' \
              -e 's|artifacts/round-stop-2026-05-09/([a-z]+)|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1|g' \
              -e 's|artifacts/reverify-2026-05-06/([a-z]+)|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1|g' \
              -e 's|artifacts/v0.4-smoke/([a-z]+)|artifacts/manual-smoke/'"${{ matrix.rid }}"'/\1|g' \
              -e 's|fresh-publish/([a-z]+)\.exe|\1|g' \
              -e 's|bin/([a-z]+)\.exe|\1|g' \
              "$dst_runner"
            rm -f "$dst_runner.bak"

            # Fail loud: a stale v0.4-smoke path means the retarget sed missed,
            # so the runner would hit a nonexistent binary and vacuously "pass".
            if grep -q "v0.4-smoke" "$dst_runner"; then
              echo "::error::sed retarget failed for $t — stale v0.4-smoke path remains" ; exit 1
            fi

            echo "  running smokes (timeout 240s) ..." | tee -a "$SUMMARY"
            timeout 240s bash "$dst_runner" > "$ART/$t/run-smokes.stdout" 2> "$ART/$t/run-smokes.stderr"
            rc=$?
            # Tools use either out/ or results/ for exit-code captures.
            count=0
            for d in "$ART/$t/out" "$ART/$t/results"; do
              if [ -d "$d" ]; then
                count=$((count + $(find "$d" -name '*.exit*' -type f 2>/dev/null | wc -l)))
              fi
            done
            echo "  rc=$rc smoke_count=$count" | tee -a "$SUMMARY"
          done

          echo "" | tee -a "$SUMMARY"
          echo "=== final tally for ${{ matrix.rid }} ===" | tee -a "$SUMMARY"
          grep -E "^==== |^  rc=|^  SKIP:" "$SUMMARY" | head -100 | tee -a "$SUMMARY"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: manual-smoke-${{ matrix.rid }}
          path: artifacts/manual-smoke/${{ matrix.rid }}/
          retention-days: 30
